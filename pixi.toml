[workspace]
authors = ["Joosep Pata <joosep.pata@gmail.com>"]
channels = ["pytorch", "conda-forge", "bioconda", "pyg"]
name = "pytorch-train"
platforms = ["linux-64"]
version = "0.1.0"

[activation.env]
LD_LIBRARY_PATH = "$CONDA_PREFIX/lib:$LD_LIBRARY_PATH"
PYTHONPATH = "$PIXI_PROJECT_ROOT/src:$PYTHONPATH"

[feature.tallinn.activation]
env = { SITE = "tallinn", PROFILE = ".profiles/tallinn", CORES = "1", COLLIDERML_DATA_DIR = "/local/joosep/colliderml" }

[feature.local.activation]
env = { SITE = "local", PROFILE = ".profiles/local", CORES = "1" }

[feature.tallinn.tasks]
init = """
mkdir -p .profiles/tallinn \
&& echo '#!/bin/bash
# properties = {properties}
{exec_job}' > .profiles/tallinn/jobscript.sh \
&& echo 'executor: "slurm"
jobscript: "jobscript.sh"
jobs: unlimited
restart-times: 0
max-jobs-per-second: 1
max-status-checks-per-second: 1
slurm-init-seconds-before-status-checks: 60
seconds-between-status-checks: 60
latency-wait: 60
verbose: true
use-conda: false
default-resources:
  - slurm_account="hepusers"' > .profiles/tallinn/config.v8+.yaml
"""

[feature.local.tasks]
init = """
mkdir -p .profiles/local \
&& echo 'executor: "local"
jobs: 1
restart-times: 0
local-cores: 1
verbose: false' > .profiles/local/config.v8+.yaml
"""

[tasks]
train = "python scripts/train_example.py"
scan = "python scripts/scan_params.py"
snakemake = "snakemake"
run-snakemake = "snakemake --snakefile Snakefile_panda --workflow-profile $PROFILE --cores $CORES"
dry-run = "snakemake --dry-run"
download-ttbar = "colliderml download --channels ttbar --pileup pu0 --objects particles,tracker_hits,calo_hits,tracks --max-events 50000"
download-ggf = "colliderml download --channels ggf --pileup pu0 --objects particles,tracker_hits,calo_hits,tracks --max-events 50000"
download = { depends-on = ["download-ttbar", "download-ggf"] }

[dependencies]
python = "==3.11"
#libstdcxx-ng = "*"
umap-learn = ">=0.5.11,<0.6"
setuptools = "==81.0.0"
snakemake = ">=8.0"
snakemake-executor-plugin-slurm = "*"
snakemake-executor-plugin-cluster-generic = "*"

[pypi-options]
index-strategy = "unsafe-best-match"
extra-index-urls = ["https://download.pytorch.org/whl/cu128"]
find-links = [
  { url = "https://data.pyg.org/whl/torch-2.9.1+cu128.html" }
]

[pypi-dependencies]
colliderml = "*"
numpy = "*"
awkward = "*"
pyarrow = "*"
pandas = "*"
tqdm = "*"
matplotlib = "*"
seaborn = "*"
tensorboard = ">=2.20.0"
addict = "*"
timm = "*"
h5py = "*"
huggingface_hub = "*"
spconv-cu126 = "*"
cumm = "==0.7.3"
torch-scatter = "*"
pyyaml = "*"
torch = "==2.9.1"
torchvision = "*"
torchaudio = "*"

[environments]
tallinn = ["tallinn"]
local = ["local"]
default = ["tallinn"]
