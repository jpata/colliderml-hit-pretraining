[workspace]
authors = ["Joosep Pata <joosep.pata@gmail.com>"]
channels = ["pytorch", "conda-forge", "bioconda"]
name = "pytorch-train"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
train = "LD_LIBRARY_PATH=$PIXI_PROJECT_ROOT/.pixi/envs/default/lib python train_example.py --output_loss loss.csv --max_events 2000 --mask_ratio 0.75 --lr 3e-4 --num_hits 256 --epochs 20"
scan = "LD_LIBRARY_PATH=$PIXI_PROJECT_ROOT/.pixi/envs/default/lib python scan_params.py"
snakemake = "LD_LIBRARY_PATH=$PIXI_PROJECT_ROOT/.pixi/envs/default/lib snakemake"

[dependencies]
python = "*"
libstdcxx-ng = "*"
umap-learn = ">=0.5.11,<0.6"

[pypi-dependencies]
colliderml = "*"
numpy = "*"
awkward = "*"
pyarrow = "*"
pandas = "*"
tqdm = "*"
matplotlib = "*"
seaborn = "*"
snakemake = "*"
torch = "*"
torchvision = "*"
torchaudio = "*"
