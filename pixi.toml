[workspace]
authors = ["Joosep Pata <joosep.pata@gmail.com>"]
channels = ["pytorch", "conda-forge", "bioconda"]
name = "pytorch-train"
platforms = ["linux-64"]
version = "0.1.0"

[activation.env]
LD_LIBRARY_PATH = "$CONDA_PREFIX/lib:$LD_LIBRARY_PATH"
COLLIDERML_DATA_DIR = "data"

[tasks]
train = "python train_example.py"
scan = "python scan_params.py"
snakemake = "snakemake"
download-ttbar = "colliderml download --channels ttbar --pileup pu0 --objects particles,tracker_hits,calo_hits,tracks --max-events 10000"
download-ggf = "colliderml download --channels ggf --pileup pu0 --objects particles,tracker_hits,calo_hits,tracks --max-events 10000"
download = { depends-on = ["download-ttbar", "download-ggf"] }

[dependencies]
python = "*"
libstdcxx-ng = "*"
umap-learn = ">=0.5.11,<0.6"
setuptools = "==81.0.0"

[pypi-dependencies]
colliderml = "*"
numpy = "*"
awkward = "*"
pyarrow = "*"
pandas = "*"
tqdm = "*"
matplotlib = "*"
seaborn = "*"
snakemake = "*"
torch = "*"
torchvision = "*"
torchaudio = "*"
tensorboard = ">=2.20.0"
setuptools = "==81.0.0"
