[workspace]
authors = ["Joosep Pata <joosep.pata@gmail.com>"]
channels = ["pytorch", "conda-forge"]
name = "pytorch-train"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
train = "LD_LIBRARY_PATH=$PIXI_PROJECT_ROOT/.pixi/envs/default/lib python train_example.py"
scan = "LD_LIBRARY_PATH=$PIXI_PROJECT_ROOT/.pixi/envs/default/lib python scan_params.py"

[dependencies]
python = "*"
numpy = "*"
awkward = "*"
pyarrow = "*"
pandas = "*"
tqdm = "*"
libstdcxx-ng = "*"

[pypi-dependencies]
torch = "*"
torchvision = "*"
torchaudio = "*"
